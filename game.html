<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Petualangan Bentuk & Warna</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --sky-top:#BFE7FF;
    --sky-bottom:#FFF6DE;
    --ink:#3A3355;
    --sun:#FFC93C;
    --coral:#FF6F6B;
    --leaf:#4FBE85;
    --grape:#9B72CF;
    --sea:#3FA7D6;
    --card-bg:#FFFFFF;
    --star-empty:#E4DCF5;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{
    margin:0; height:100%; overflow:hidden;
    font-family:'Nunito', sans-serif;
    color:var(--ink);
    background:linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 100%);
    touch-action: manipulation;
    user-select:none;
  }
  #app{
    position:relative;
    width:100%; height:100%;
    display:flex; flex-direction:column;
    padding: 14px 16px 20px;
  }

  /* Background floating clouds/hills for warmth, purely decorative */
  .bg-hill{
    position:absolute; bottom:0; left:0; width:100%; height:22%;
    background:#BFF2C8; border-radius:50% 50% 0 0 / 100% 100% 0 0;
    opacity:.6; z-index:0;
  }
  .bg-cloud{
    position:absolute; background:#fff; border-radius:50px; opacity:.8; z-index:0;
    animation: drift 40s linear infinite;
  }
  @keyframes drift{ from{transform:translateX(-10vw);} to{transform:translateX(110vw);} }

  /* Top bar */
  #topbar{
    position:relative; z-index:2;
    display:flex; align-items:center; justify-content:space-between;
    gap:10px;
  }
  #stars{ display:flex; gap:4px; background:rgba(255,255,255,.6); padding:6px 10px; border-radius:999px; }
  .star-slot{ width:22px; height:22px; }
  #mascot-wrap{ display:flex; align-items:center; gap:8px; }
  #sound-btn{
    width:44px; height:44px; border-radius:50%; border:none;
    background:#fff; box-shadow:0 3px 0 #d8d3ee; display:flex; align-items:center; justify-content:center;
    font-size:20px; cursor:pointer;
  }
  #sound-btn:active{ box-shadow:0 1px 0 #d8d3ee; transform:translateY(2px); }

  #bo{ width:64px; height:64px; cursor:pointer; }
  #bo.bounce{ animation: bo-bounce .7s ease; }
  #bo.wiggle{ animation: bo-wiggle .6s ease; }
  @keyframes bo-bounce{
    0%{transform:translateY(0) scale(1);}
    30%{transform:translateY(-18px) scale(1.05);}
    55%{transform:translateY(0) scale(.96);}
    75%{transform:translateY(-6px) scale(1.02);}
    100%{transform:translateY(0) scale(1);}
  }
  @keyframes bo-wiggle{
    0%,100%{transform:rotate(0);}
    25%{transform:rotate(-8deg);}
    75%{transform:rotate(8deg);}
  }

  /* Main content */
  #stage{
    position:relative; z-index:2;
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
    gap:10px; padding-top:6px; min-height:0;
  }
  #prompt{
    font-family:'Baloo 2', sans-serif; font-weight:700;
    font-size:clamp(20px, 5.4vw, 30px);
    text-align:center; margin:2px 0 0;
    color:var(--ink);
  }
  #prompt .hi{ color:var(--coral); }

  #target-box{
    background:var(--card-bg);
    border-radius:26px;
    box-shadow:0 8px 0 #e6e0f5;
    padding:10px;
    display:flex; align-items:center; justify-content:center;
    width:min(30vw, 130px); height:min(30vw, 130px);
    flex-shrink:0;
  }
  #target-box svg{ width:78%; height:78%; display:block; }

  #replay-btn{
    border:none; background:#fff; border-radius:999px; padding:6px 14px;
    font-family:'Nunito'; font-weight:800; font-size:13px; color:var(--sea);
    box-shadow:0 3px 0 #dcecf5; cursor:pointer; display:flex; align-items:center; gap:6px;
  }
  #replay-btn:active{ transform:translateY(2px); box-shadow:0 1px 0 #dcecf5; }

  #options{
    display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; gap:14px;
    width:100%; max-width:520px;
    flex:1; min-height:220px;
    padding: 4px 4px 4px;
  }
  .opt{
    background:var(--card-bg);
    border-radius:24px;
    border:4px solid transparent;
    box-shadow:0 6px 0 #e3ddf2;
    display:flex; align-items:center; justify-content:center;
    padding:8%;
    cursor:pointer;
    transition:transform .08s ease;
    min-height:0;
    min-width:0;
  }
  .opt:active{ transform:translateY(3px); box-shadow:0 3px 0 #e3ddf2; }
  .opt svg{ width:100%; height:100%; max-width:100%; max-height:100%; display:block; }
  .opt.correct-flash{ border-color:var(--leaf); animation: pop .5s ease; }
  .opt.wrong-flash{ animation: shake .45s ease; }
  @keyframes pop{ 0%{transform:scale(1);} 50%{transform:scale(1.08);} 100%{transform:scale(1);} }
  @keyframes shake{
    0%,100%{transform:translateX(0);}
    25%{transform:translateX(-8px);}
    75%{transform:translateX(8px);}
  }

  #feedback{
    position:absolute; left:50%; top:38%; transform:translate(-50%,-50%);
    font-family:'Baloo 2'; font-weight:800; font-size:clamp(22px,7vw,38px);
    color:#fff; text-shadow:0 3px 0 rgba(0,0,0,.15);
    background:var(--leaf); padding:14px 26px; border-radius:22px;
    opacity:0; pointer-events:none; z-index:5;
    transition:opacity .15s ease, transform .15s ease;
  }
  #feedback.show{ opacity:1; transform:translate(-50%,-58%); }
  #feedback.try{ background:var(--grape); }

  /* Confetti */
  .confetti{
    position:absolute; width:10px; height:14px; z-index:4;
    top:38%; left:50%; opacity:1; border-radius:2px;
    animation: fall 1.1s ease-out forwards;
  }
  @keyframes fall{
    to{ transform: translate(var(--dx), var(--dy)) rotate(var(--rot)); opacity:0; }
  }

  /* End screen */
  #end-screen{
    position:absolute; inset:0; z-index:10;
    background:linear-gradient(180deg, #FFE9A8, #FFD1DC 100%);
    display:none; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:24px;
  }
  #end-screen.show{ display:flex; }
  #end-screen h1{ font-family:'Baloo 2'; font-size:clamp(28px,8vw,44px); margin:0 0 6px; color:var(--ink); }
  #end-screen p{ font-size:clamp(16px,4vw,20px); font-weight:700; margin:0 0 20px; color:var(--ink); }
  #trophy{ font-size:80px; margin-bottom:6px; animation: bo-bounce 1.4s ease infinite; }
  #play-again{
    font-family:'Baloo 2'; font-weight:700; font-size:20px; color:#fff;
    background:var(--coral); border:none; border-radius:999px; padding:16px 36px;
    box-shadow:0 6px 0 #d1524e; cursor:pointer;
  }
  #play-again:active{ transform:translateY(4px); box-shadow:0 2px 0 #d1524e; }
  #end-stars{ display:flex; gap:6px; margin-bottom:18px; }
  #end-stars svg{ width:34px; height:34px; }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:.001ms !important; animation-iteration-count:1 !important; }
  }
</style>
</head>
<body>
<div id="app">
  <div class="bg-hill"></div>
  <div class="bg-cloud" style="width:70px;height:26px;top:8%;left:-10%;"></div>
  <div class="bg-cloud" style="width:50px;height:20px;top:16%;left:40%;animation-duration:55s;"></div>

  <div id="topbar">
    <div id="stars"></div>
    <div id="mascot-wrap">
      <button id="sound-btn" title="Suara">🔊</button>
      <svg id="bo" viewBox="0 0 100 100"></svg>
    </div>
  </div>

  <div id="stage">
    <div id="prompt">Ayo mulai!</div>
    <div id="target-box"><svg viewBox="0 0 100 100" id="target-svg"></svg></div>
    <button id="replay-btn">🔁 Dengar lagi</button>
    <div id="options"></div>
  </div>

  <div id="feedback"></div>
</div>

<div id="end-screen">
  <div id="trophy">🏆</div>
  <h1>Kamu Juara Bentuk & Warna!</h1>
  <div id="end-stars"></div>
  <p>Kamu hebat sekali sudah mencoba semuanya!</p>
  <button id="play-again">Main Lagi</button>
</div>

<script>
(function(){
  "use strict";

  /* ---------- Data ---------- */
  var SHAPES = [
    {id:'lingkaran', name:'lingkaran'},
    {id:'persegi', name:'persegi'},
    {id:'segitiga', name:'segitiga'},
    {id:'bintang', name:'bintang'},
    {id:'segiempat', name:'persegi panjang'},
    {id:'hati', name:'hati'}
  ];
  var COLORS = [
    {id:'merah', name:'merah', hex:'#FF5C5C'},
    {id:'biru', name:'biru', hex:'#4D96FF'},
    {id:'kuning', name:'kuning', hex:'#FFD93D'},
    {id:'hijau', name:'hijau', hex:'#4FBE85'},
    {id:'ungu', name:'ungu', hex:'#B185DB'},
    {id:'oranye', name:'oranye', hex:'#FF9F45'}
  ];
  var TOTAL_ROUNDS = 8;
  var PRAISE = [
    {text:"Hebat sekali!", key:"praise_1"},
    {text:"Kamu pintar!", key:"praise_2"},
    {text:"Betul banget!", key:"praise_3"},
    {text:"Luar biasa!", key:"praise_4"},
    {text:"Keren, Nak!", key:"praise_5"},
    {text:"Asyik, benar!", key:"praise_6"}
  ];
  var ENCOURAGE = [
    {text:"Coba lagi ya!", key:"encourage_1"},
    {text:"Hampir, ayo coba lagi!", key:"encourage_2"},
    {text:"Semangat, kamu pasti bisa!", key:"encourage_3"},
    {text:"Yuk coba sekali lagi!", key:"encourage_4"}
  ];

  /* ---------- Shape SVG markup (inner shapes only, viewBox 0 0 100 100) ---------- */
  function shapeMarkup(shapeId, fill){
    switch(shapeId){
      case 'lingkaran':
        return '<circle cx="50" cy="50" r="42" fill="'+fill+'"/>';
      case 'persegi':
        return '<rect x="10" y="10" width="80" height="80" rx="14" fill="'+fill+'"/>';
      case 'segitiga':
        return '<polygon points="50,10 92,88 8,88" fill="'+fill+'" stroke="'+fill+'" stroke-linejoin="round" stroke-width="6"/>';
      case 'bintang':
        return '<polygon points="50,6 61,37 95,37 67,58 78,92 50,72 22,92 33,58 5,37 39,37" fill="'+fill+'" stroke="'+fill+'" stroke-linejoin="round" stroke-width="4"/>';
      case 'segiempat':
        return '<rect x="4" y="24" width="92" height="52" rx="12" fill="'+fill+'"/>';
      case 'hati':
        return '<path d="M50,86 C14,62 -4,32 20,14 C34,4 48,12 50,26 C52,12 66,4 80,14 C104,32 86,62 50,86 Z" fill="'+fill+'"/>';
      default:
        return '';
    }
  }

  function colorBlobMarkup(hex){
    return '<circle cx="50" cy="55" r="34" fill="'+hex+'"/>' +
           '<circle cx="38" cy="42" r="8" fill="#fff" opacity="0.35"/>';
  }

  function renderInto(el, markup){
    el.innerHTML = markup;
  }

  /* ---------- Mascot Bo ---------- */
  var bo = document.getElementById('bo');
  var boState = 'idle'; // idle | happy | encourage
  var boColorIdx = 0;
  function boMarkup(state){
    var bodyColor = COLORS[boColorIdx % COLORS.length].hex;
    var mouth, eyes, cheeks = '', sparkle = '';
    if(state === 'happy'){
      mouth = '<path d="M32,58 Q50,80 68,58" stroke="#3A3355" stroke-width="5" fill="none" stroke-linecap="round"/>';
      eyes = '<circle cx="38" cy="44" r="5" fill="#3A3355"/><circle cx="62" cy="44" r="5" fill="#3A3355"/>';
      cheeks = '<circle cx="26" cy="55" r="6" fill="#FF9FA0" opacity=".7"/><circle cx="74" cy="55" r="6" fill="#FF9FA0" opacity=".7"/>';
      sparkle = '<text x="14" y="20" font-size="16">✨</text><text x="76" y="24" font-size="14">✨</text>';
    } else if(state === 'encourage'){
      mouth = '<path d="M36,64 Q50,56 64,64" stroke="#3A3355" stroke-width="5" fill="none" stroke-linecap="round"/>';
      eyes = '<circle cx="38" cy="46" r="4.5" fill="#3A3355"/><circle cx="62" cy="46" r="4.5" fill="#3A3355"/>';
    } else {
      mouth = '<path d="M38,60 Q50,70 62,60" stroke="#3A3355" stroke-width="5" fill="none" stroke-linecap="round"/>';
      eyes = '<circle cx="38" cy="45" r="5" fill="#3A3355"/><circle cx="62" cy="45" r="5" fill="#3A3355"/>';
    }
    return '<circle cx="50" cy="52" r="40" fill="'+bodyColor+'"/>' +
           cheeks + eyes + mouth + sparkle;
  }
  function setBo(state){
    boState = state;
    renderInto(bo, boMarkup(state));
  }
  setBo('idle');

  bo.addEventListener('click', function(){
    boColorIdx++;
    setBo(boState);
  });

  /* ---------- Sound ---------- */
  var soundOn = true;
  var soundBtn = document.getElementById('sound-btn');
  var audioCtx = null;
  function ensureCtx(){
    if(!audioCtx){
      try{ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }catch(e){}
    }
    return audioCtx;
  }
  function chime(kind){
    if(!soundOn) return;
    var ctx = ensureCtx();
    if(!ctx) return;
    var notes = kind === 'correct' ? [523.25, 659.25, 783.99] : [349.23, 293.66];
    notes.forEach(function(freq, i){
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      var start = ctx.currentTime + i*0.11;
      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.exponentialRampToValueAtTime(0.18, start+0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, start+0.35);
      osc.connect(gain).connect(ctx.destination);
      osc.start(start);
      osc.stop(start+0.4);
    });
  }
  function speak(text){
    if(!soundOn) return;
    if(!('speechSynthesis' in window)) return;
    try{
      window.speechSynthesis.cancel();
      var u = new SpeechSynthesisUtterance(text);
      u.lang = 'id-ID';
      u.rate = 0.92;
      u.pitch = 1.15;
      window.speechSynthesis.speak(u);
    }catch(e){}
  }

  /* Custom recorded audio support.
     Drop files into a "sounds" folder next to this HTML file, named exactly
     as listed in the SOUND_FILES comment near the top of this script.
     If a file is missing or fails to load, it automatically falls back
     to the built-in voice — so you can replace clips one at a time. */
  var SOUND_BASE = 'sounds/';
  var SOUND_EXT = '.mp3'; // change to '.wav' or '.ogg' if that's what you recorded
  var audioCache = {};
  function playClip(key, fallbackText){
    if(!soundOn) return;
    var src = SOUND_BASE + key + SOUND_EXT;
    var clip = audioCache[key];
    if(!clip){
      clip = new Audio(src);
      audioCache[key] = clip;
    } else {
      clip.currentTime = 0;
    }
    var usedFallback = false;
    var toFallback = function(){
      if(usedFallback) return;
      usedFallback = true;
      speak(fallbackText);
    };
    clip.onerror = toFallback;
    var playPromise = clip.play();
    if(playPromise && playPromise.catch){ playPromise.catch(toFallback); }
  }
  soundBtn.addEventListener('click', function(){
    soundOn = !soundOn;
    soundBtn.textContent = soundOn ? '🔊' : '🔇';
    if(!soundOn){
      if('speechSynthesis' in window) window.speechSynthesis.cancel();
      Object.keys(audioCache).forEach(function(k){ audioCache[k].pause(); });
    }
  });

  /* ---------- Stars progress ---------- */
  var starsEl = document.getElementById('stars');
  var starsWon = 0;
  function starSvg(filled){
    var fill = filled ? '#FFC93C' : '#E4DCF5';
    return '<svg class="star-slot" viewBox="0 0 24 24"><polygon points="12,1 15,9 23,9 16.5,14 19,22 12,17 5,22 7.5,14 1,9 9,9" fill="'+fill+'"/></svg>';
  }
  function renderStars(){
    var html = '';
    for(var i=0;i<TOTAL_ROUNDS;i++){ html += starSvg(i < starsWon); }
    starsEl.innerHTML = html;
  }
  renderStars();

  /* ---------- Round state ---------- */
  var round = 0;
  var currentRound = null;
  var locked = false;

  function pickRandom(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
  function pickNUnique(arr, n){
    var pool = arr.slice();
    var out = [];
    while(out.length < n && pool.length){
      var idx = Math.floor(Math.random()*pool.length);
      out.push(pool.splice(idx,1)[0]);
    }
    return out;
  }

  function buildRound(){
    var type = Math.random() < 0.5 ? 'shape' : 'color';
    var data = { type: type };

    if(type === 'shape'){
      var targetShape = pickRandom(SHAPES);
      var otherShapes = pickNUnique(SHAPES.filter(function(s){return s.id!==targetShape.id;}), 3);
      var optionShapes = [targetShape].concat(otherShapes);
      var usedColors = pickNUnique(COLORS, 4);
      var options = optionShapes.map(function(s, i){
        return { shape:s.id, color:usedColors[i].hex, correct: s.id===targetShape.id };
      });
      shuffle(options);
      data.targetShape = targetShape;
      data.targetSvg = shapeMarkup(targetShape.id, '#B9B3D9');
      data.prompt = 'Cari yang <span class="hi">berbentuk '+targetShape.name+'</span>!';
      data.speech = 'Cari yang bentuknya '+targetShape.name+'!';
      data.soundKey = 'shape_'+targetShape.id;
      data.options = options;
    } else {
      var targetColor = pickRandom(COLORS);
      var baseShape = pickRandom(SHAPES);
      var otherColors = pickNUnique(COLORS.filter(function(c){return c.id!==targetColor.id;}), 3);
      var otherShapesForColor = pickNUnique(SHAPES.filter(function(s){return s.id!==baseShape.id;}), 3);
      var options = [{shape:baseShape.id, color:targetColor.hex, correct:true}];
      for(var i=0;i<3;i++){
        options.push({ shape: otherShapesForColor[i].id, color: otherColors[i].hex, correct:false });
      }
      shuffle(options);
      data.targetColor = targetColor;
      data.targetSvg = colorBlobMarkup(targetColor.hex);
      data.prompt = 'Cari yang <span class="hi">warnanya '+targetColor.name+'</span>!';
      data.speech = 'Cari yang warnanya '+targetColor.name+'!';
      data.soundKey = 'color_'+targetColor.id;
      data.options = options;
    }
    return data;
  }

  function shuffle(arr){
    for(var i=arr.length-1;i>0;i--){
      var j = Math.floor(Math.random()*(i+1));
      var t = arr[i]; arr[i]=arr[j]; arr[j]=t;
    }
  }

  var promptEl = document.getElementById('prompt');
  var targetSvgEl = document.getElementById('target-svg');
  var optionsEl = document.getElementById('options');
  var replayBtn = document.getElementById('replay-btn');
  var feedbackEl = document.getElementById('feedback');

  function renderRound(){
    currentRound = buildRound();
    locked = false;
    promptEl.innerHTML = currentRound.prompt;
    renderInto(targetSvgEl, currentRound.targetSvg);

    optionsEl.innerHTML = '';
    currentRound.options.forEach(function(opt){
      var wrap = document.createElement('div');
      wrap.className = 'opt';
      var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('viewBox','0 0 100 100');
      renderInto(svg, shapeMarkup(opt.shape, opt.color));
      wrap.appendChild(svg);
      wrap.addEventListener('click', function(){ handleAnswer(opt, wrap); });
      optionsEl.appendChild(wrap);
    });

    setBo('idle');
    setTimeout(function(){ playClip(currentRound.soundKey, currentRound.speech); }, 250);
  }

  replayBtn.addEventListener('click', function(){
    if(currentRound) playClip(currentRound.soundKey, currentRound.speech);
  });

  function showFeedback(text, isTry){
    feedbackEl.textContent = text;
    feedbackEl.className = isTry ? 'try show' : 'show';
    setTimeout(function(){ feedbackEl.className = isTry ? 'try' : ''; }, 900);
  }

  function burstConfetti(){
    var colors = ['#FF6F6B','#FFC93C','#4FBE85','#4D96FF','#B185DB'];
    for(var i=0;i<24;i++){
      var p = document.createElement('div');
      p.className = 'confetti';
      var angle = Math.random()*Math.PI*2;
      var dist = 80 + Math.random()*160;
      p.style.setProperty('--dx', (Math.cos(angle)*dist)+'px');
      p.style.setProperty('--dy', (Math.sin(angle)*dist - 40)+'px');
      p.style.setProperty('--rot', (Math.random()*600-300)+'deg');
      p.style.background = colors[i % colors.length];
      p.style.left = (48 + Math.random()*4) + '%';
      document.getElementById('app').appendChild(p);
      (function(el){ setTimeout(function(){ el.remove(); }, 1200); })(p);
    }
  }

  function handleAnswer(opt, wrapEl){
    if(locked) return;
    if(opt.correct){
      locked = true;
      wrapEl.classList.add('correct-flash');
      chime('correct');
      setBo('happy');
      bo.classList.add('bounce');
      setTimeout(function(){ bo.classList.remove('bounce'); }, 700);
      var praise = pickRandom(PRAISE);
      showFeedback(praise.text, false);
      playClip(praise.key, praise.text);
      burstConfetti();
      starsWon++;
      renderStars();
      round++;
      setTimeout(function(){
        if(round >= TOTAL_ROUNDS){ showEnd(); }
        else { renderRound(); }
      }, 1300);
    } else {
      wrapEl.classList.add('wrong-flash');
      setTimeout(function(){ wrapEl.classList.remove('wrong-flash'); }, 500);
      setBo('encourage');
      bo.classList.add('wiggle');
      setTimeout(function(){ bo.classList.remove('wiggle'); }, 600);
      var enc = pickRandom(ENCOURAGE);
      showFeedback(enc.text, true);
      chime('try');
      playClip(enc.key, enc.text);
    }
  }

  /* ---------- End screen ---------- */
  var endScreen = document.getElementById('end-screen');
  var endStars = document.getElementById('end-stars');
  var playAgainBtn = document.getElementById('play-again');

  function showEnd(){
    endStars.innerHTML = '';
    for(var i=0;i<TOTAL_ROUNDS;i++){ endStars.innerHTML += starSvg(true); }
    endScreen.classList.add('show');
    chime('correct');
    playClip('end', 'Kamu juara bentuk dan warna! Hebat sekali!');
    burstConfetti();
    setTimeout(burstConfetti, 400);
  }

  playAgainBtn.addEventListener('click', function(){
    round = 0;
    starsWon = 0;
    renderStars();
    endScreen.classList.remove('show');
    renderRound();
  });
